<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fastball Futures</title>

  <style>
    :root {
      --bg: #070816;
      --panel: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.12);
      --text: #f7f7fb;
      --muted: rgba(247,247,251,0.72);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #0a0d22 0%, #05060f 100%);
    }

    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand img {
      width: 58px;
      height: 58px;
      border-radius: 12px;
    }

    nav a {
      margin-left: 10px;
      text-decoration: none;
      color: white;
      border: 1px solid var(--line);
      padding: 8px 12px;
      border-radius: 20px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      padding: 40px 0;
      align-items: center;
    }

    h2 {
      font-size: 48px;
      line-height: 1.1;
    }

    .hero-card img {
      width: 100%;
      border-radius: 20px;
    }

    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header>
      <div class="brand">
        <img src="/logo.jpeg" alt="Fastball Futures logo" />
        <div>
          <strong>FASTBALL FUTURES</strong><br>
          <small>Discipline • Structure • Timing</small>
        </div>
      </div>

      <nav>
        <a href="#">About</a>
        <a href="#">Connect</a>
      </nav>
    </header>

    <section class="hero">
      <div>
        <h2>
          Trust the process.<br>
          Respect the count.<br>
          Wait for our pitch.
        </h2>
      </div>

      <div class="hero-card">
        <img src="/logo.jpeg" alt="Fastball Futures brand art" />
      </div>
    </section>

  </div>
</body>
</html>
