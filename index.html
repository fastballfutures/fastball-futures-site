<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fastball Futures</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #050505;
  --white: #ffffff;
  --accent: #00ffc3;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--white);
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* HERO */
#hero {
  height: 50vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 5vw;
  position: relative;
  z-index: 2;
}

/* HEADLINE */
.hero-headline {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4rem, 9vw, 10rem);
  line-height: .9;
  width: 100%;
  display: flex;
  flex-direction: column;
}

.hero-headline span {
  display: block;
  width: 100%;
}

.hero-headline span:nth-child(1) {
  text-align: center;
}
.hero-headline span:nth-child(2) {
  text-align: center;
}
.hero-headline span:nth-child(3) {
  text-align: center;
}

.accent {
  color: var(--accent);
  animation: glowPulse 3s ease-in-out infinite;
}

@keyframes glowPulse {
  0%, 100% {
    text-shadow: 0 0 10px rgba(0,255,195,0.4),
                 0 0 20px rgba(0,255,195,0.2);
  }
  50% {
    text-shadow: 0 0 25px rgba(0,255,195,0.8),
                 0 0 50px rgba(0,255,195,0.4);
  }
}

.outline {
  -webkit-text-stroke: 1px #fff;
  color: transparent;
}

.hero-sub {
  max-width: 600px;
  margin-top: 20px;
  opacity: 0.7;
}

.hero-actions {
  margin-top: 30px;
}

.btn-primary {
  background: var(--accent);
  color: black;
  padding: 12px 20px;
  text-decoration: none;
  margin-right: 10px;
}

#cursorGlow {
  position: fixed;
  width: 500px;
  height: 500px;
  pointer-events: none;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,255,195,0.15) 0%, transparent 60%);
  transform: translate(-50%, -50%);
  z-index: 1;
  mix-blend-mode: screen;
}

@media (max-width: 768px) {
  .hero-headline {
    font-size: clamp(3rem, 10vw, 5rem);
  }

  .hero-headline span {
    text-align: left !important;
  }
}
</style>
</head>

<body>

<div id="cursorGlow"></div>

<section id="hero">
  <h1 class="hero-headline">
    <span>Wait For Your</span>
    <span class="accent">Pitch.</span>
    <span class="outline">Swing Hard.</span>
  </h1>

  <p class="hero-sub">
    Discipline, structure, and timing — not hype, not shortcuts. We define risk before entry, respect our stops, and let process drive outcome.
  </p>

  <div class="hero-actions">
    <a href="#" class="btn-primary">Our Approach</a>
  </div>
</section>

<script>
const glow = document.getElementById('cursorGlow');
const headline = document.querySelector('.hero-headline');

document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top = e.clientY + 'px';

  const rect = headline.getBoundingClientRect();
  const distance = Math.abs(e.clientX - rect.left - rect.width / 2);

  let intensity = Math.max(0.05, 0.25 - distance / 1000);
  glow.style.background = `radial-gradient(circle, rgba(0,255,195,${intensity}) 0%, transparent 60%)`;
});
</script>

</body>
</html>
